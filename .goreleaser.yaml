version: 2

project_name: kkfly

before:
  hooks:
    - go mod tidy

builds:
  - id: kkfly
    main: ./cmd/kkfly
    binary: kkfly
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    builds:
      - kkfly
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: kevin197011
    name: kkfly
  name_template: "{{ .ProjectName }} v{{ .Version }}"
  prerelease: auto

changelog:
  use: github

