user: ubuntu
private_key_path: ~/.ssh/id_ed25519
private_key_content: ""
# private_key_content: |
#   -----BEGIN RSA PRIVATE KEY-----
#   MIIEpAIBAAKCAQEAx3y7VuN1XhWf58UOuW491y/1Ym85J6OaxxSj1QOiQK0w1gV
#   jE0xOiVdGpWJlI29Qm4D4jFqVwD3hQF11jN1WYvVlU8H1U0O0O0O0O0O0O0O0O
